name: acme_driver
description: "ACME-DRIVER — App de repartidores del ecosistema ACME PEDIDOS"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Estado ──────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navegación ───────────────────────────────────────────
  go_router: ^14.2.7

  # ── Supabase ─────────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── Variables de entorno ─────────────────────────────────
  flutter_dotenv: ^5.1.0

  # ── Mapas y Geolocalización ──────────────────────────────
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  url_launcher: ^6.3.0

  # ── Firebase / FCM ───────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # ── HTTP / Networking ────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Almacenamiento local ─────────────────────────────────
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # ── UI / Componentes ─────────────────────────────────────
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  image_picker: ^1.1.2
  intl: ^0.19.0
  timeago: ^3.6.1
  badges: ^3.1.2
  phosphor_flutter: ^2.0.1

  # ── Permisos ──────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Miscelánea ────────────────────────────────────────────
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  uuid: ^4.4.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
